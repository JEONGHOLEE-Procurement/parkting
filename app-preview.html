<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파크팅 (Parkting) - 모바일 앱 미리보기</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A1A;
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --text: #FFFFFF;
      --primary: #FF6B9D;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(ellipse at top left, rgba(123, 97, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(255, 107, 157, 0.15) 0%, transparent 50%);
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2.5rem;
      margin: 0 0 10px;
      font-weight: 800;
      background: linear-gradient(135deg, #FF6B9D, #C44FE2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn.active {
      background: rgba(255, 107, 157, 0.2);
      border-color: var(--primary);
    }
    
    /* Device Frame */
    .device {
      position: relative;
      width: 375px;
      height: 812px;
      border: 12px solid #222;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 0 4px #111;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--bg);
    }
    
    /* iPhone specific */
    .device.iphone {
      border-radius: 50px;
    }
    .device.iphone::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #222;
      border-radius: 0 0 20px 20px;
      z-index: 9999;
    }
    
    /* Android specific */
    .device.android {
      border-radius: 20px;
      border-width: 10px 8px;
    }
    .device.android::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      background: #111;
      border-radius: 50%;
      z-index: 9999;
    }
    
    .screen {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }
    
    .badges {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }
    .store-badge {
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      filter: grayscale(1);
      opacity: 0.5;
    }
    .store-badge span { font-size: 0.75rem; display: block; font-weight: 400; color: #aaa; }
  </style>
</head>
<body>

  <div class="header">
    <h1>파크팅 (Parkting)</h1>
    <p>네이티브 앱 미리보기 시뮬레이터 (iOS / Android)</p>
  </div>
  
  <div class="controls">
    <button class="btn active" id="btn-ios">📱 iPhone (iOS)</button>
    <button class="btn" id="btn-android">🤖 Android</button>
  </div>
  
  <div class="device iphone" id="device-frame">
    <!-- Load the actual app in an iframe -->
    <iframe src="index.html" class="screen" title="App Preview"></iframe>
  </div>
  
  <div class="badges">
    <div class="store-badge">
      <div style="font-size:24px;">🍏</div>
      <div>
        <span>출시 예정</span>
        App Store
      </div>
    </div>
    <div class="store-badge">
      <div style="font-size:24px;">▶️</div>
      <div>
        <span>출시 예정</span>
        Google Play
      </div>
    </div>
  </div>

  <script>
    document.getElementById('btn-ios').addEventListener('click', (e) => {
      document.getElementById('device-frame').className = 'device iphone';
      e.target.classList.add('active');
      document.getElementById('btn-android').classList.remove('active');
    });
    
    document.getElementById('btn-android').addEventListener('click', (e) => {
      document.getElementById('device-frame').className = 'device android';
      e.target.classList.add('active');
      document.getElementById('btn-ios').classList.remove('active');
    });
  </script>
</body>
</html>
